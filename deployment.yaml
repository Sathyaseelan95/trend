apiVersion: apps/v1
kind: Deployment
metadata:
  name: project2-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project2
  template:
    metadata:
      labels:
        app: project2
    spec:
      containers:
      - name: project2
        image: sathyaseelans/project2:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
